<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Nebula Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #4ADE80;
      --accent-dim: rgba(74, 222, 128, 0.15);
      --bg: rgba(13, 17, 23, 0.82);
      --text: #E6EDF3;
      --text-dim: #8B949E;
      --border: rgba(48, 54, 61, 0.8);
      --speaking-glow: rgba(74, 222, 128, 0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      color: var(--text);
      user-select: none;
      overflow: hidden;
    }

    .overlay-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      width: 240px;
      min-height: 80px;
      padding: 0 0 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }

    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    .overlay-room-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .overlay-mic-mode {
      font-size: 10px;
      color: var(--text-dim);
    }

    .overlay-peers {
      padding: 6px 8px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .overlay-peer {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 8px;
      transition: background 0.15s;
    }

    .overlay-peer.speaking {
      background: var(--accent-dim);
    }

    .overlay-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #21262D;
      font-size: 11px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 2px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }

    .overlay-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay-peer.speaking .overlay-avatar {
      border-color: var(--accent);
      box-shadow: 0 0 8px var(--speaking-glow);
    }

    .overlay-peer-info {
      flex: 1;
      min-width: 0;
    }

    .overlay-peer-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    .overlay-peer.speaking .overlay-peer-name {
      color: var(--accent);
    }

    .overlay-mic-icon {
      font-size: 12px;
      flex-shrink: 0;
    }

    /* Speaking bars animation */
    .speak-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .overlay-peer.speaking .speak-bars { opacity: 1; }

    .speak-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      animation: barBounce 0.5s infinite ease-in-out alternate;
    }
    .speak-bar:nth-child(1) { animation-delay: 0s;    height: 4px; }
    .speak-bar:nth-child(2) { animation-delay: 0.1s;  height: 8px; }
    .speak-bar:nth-child(3) { animation-delay: 0.2s;  height: 12px; }
    .speak-bar:nth-child(4) { animation-delay: 0.15s; height: 6px; }

    @keyframes barBounce {
      from { transform: scaleY(0.4); }
      to   { transform: scaleY(1); }
    }

    .overlay-empty {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="overlay-card">
    <div class="overlay-header">
      <span class="overlay-room-name" id="overlay-room-name">Not Connected</span>
      <span class="overlay-mic-mode" id="overlay-mode">—</span>
    </div>
    <div class="overlay-peers" id="overlay-peers">
      <div class="overlay-empty">Join a voice room</div>
    </div>
  </div>

  <script>
    // Receive overlay data via IPC
    if (window.nebula) {
      window.nebula.onOverlayData((data) => {
        renderOverlay(data);
      });
    }

    function renderOverlay(data) {
      const roomNameEl = document.getElementById('overlay-room-name');
      const modeEl = document.getElementById('overlay-mode');
      const peersEl = document.getElementById('overlay-peers');

      roomNameEl.textContent = data.roomName || 'Not Connected';
      modeEl.textContent = data.muted ? '🔇' : data.ptt ? 'PTT' : 'VAD';

      if (!data.peers || data.peers.length === 0) {
        peersEl.innerHTML = '<div class="overlay-empty">No one here yet</div>';
        return;
      }

      peersEl.innerHTML = data.peers.map(peer => `
        <div class="overlay-peer ${peer.speaking ? 'speaking' : ''}" id="op-${peer.peerId}">
          <div class="overlay-avatar">
            ${peer.avatar
              ? `<img src="${peer.avatar}" alt="${peer.username}" />`
              : peer.username[0].toUpperCase()}
          </div>
          <div class="overlay-peer-info">
            <div class="overlay-peer-name">${escHtml(peer.username)}${peer.isLocal ? ' (You)' : ''}</div>
          </div>
          ${peer.speaking
            ? `<div class="speak-bars">
                <div class="speak-bar"></div>
                <div class="speak-bar"></div>
                <div class="speak-bar"></div>
                <div class="speak-bar"></div>
              </div>`
            : `<span class="overlay-mic-icon">${peer.muted ? '🔇' : ''}</span>`}
        </div>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
